name: Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            if [ ! -d /home/proyecto/rutasVivasService/ ]; then
              echo "Directory /home/proyecto/rutasVivasService/ not found. Aborting deployment."
              exit 1
            fi
            cd /home/proyecto/rutasVivasService/
            git pull origin master
            docker stop rutasvivasservice
            docker rm rutasvivasservice
            docker build -f Dockerfile -t rutasvivasservice . || { echo "Docker build failed"; exit 1; }
            docker run --privileged -d -it -p 5030:8090  -v dind-data:/var/lib/docker --restart unless-stopped --name rutasvivasservice rutasvivasservice || { echo "Docker run failed"; exit 1; }
